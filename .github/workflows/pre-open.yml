name: pre-open

# Locks intraday (open-side) entries and resolves the prior overnight book, before the
# US market open. See docs/DESIGN.md "Meta-loop" and AGENTS.md "The loop".

on:
  schedule:
    # 13:15 UTC, weekdays — before the 09:30 ET open (covers EDT; runs early in EST).
    - cron: "15 13 * * 1-5"
  workflow_dispatch:
    inputs:
      offline:
        description: "Force the deterministic synthetic provider"
        type: boolean
        default: false

concurrency:
  group: daytripper-loop
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pre-open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Run pre-open
        run: |
          daytripper pre-open ${{ (github.event_name == 'workflow_dispatch' && inputs.offline) && '--offline' || '' }}
      - name: Commit locked entries (audit trail)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git commit -m "pre-open: lock intraday entries [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
