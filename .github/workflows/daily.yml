name: daily

# Post-close publish pass. Phase 1 runs the backtest on EOD data and republishes
# the candidate board to GitHub Pages. The pre-open / pre-close entry-locking
# jobs in the design activate with paper execution (a later phase).
on:
  schedule:
    - cron: "0 22 * * 1-5" # ~after the US close on weekdays (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run the loop
        run: python -m daytripper.loop.run docs
      - name: Commit updated dashboard
        run: |
          git config user.name "day-tripper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/index.html docs/board.csv
          if git diff --cached --quiet; then
            echo "No dashboard changes."
          else
            git commit -m "chore: update candidate board dashboard [skip ci]"
            git push
          fi
